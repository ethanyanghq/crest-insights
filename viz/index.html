<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Idea Phase Space</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>Idea Phase Space</h1>
      </header>

      <section class="control-strip">
        <div class="control-group">
          <span class="control-label">Mode</span>
          <div class="segmented" id="mode-toggle">
            <button type="button" class="is-active" data-mode="current">Current</button>
            <button type="button" data-mode="reframed">Reframed</button>
          </div>
        </div>
        <div class="control-group" id="domain-filter"></div>
        <div class="control-group" id="archetype-filter"></div>
        <div class="control-group" id="status-filter"></div>
        <label class="checkbox-control">
          <input type="checkbox" id="show-all-labels">
          <span>Show all labels</span>
        </label>
      </section>

      <main class="workspace">
        <section class="chart-panel">
          <div class="chart-frame">
            <svg id="phase-space" aria-label="Idea phase space scatterplot"></svg>
          </div>
        </section>

        <aside class="detail-panel">
          <div class="detail-card" id="detail-card"></div>
        </aside>
      </main>
    </div>

    <script src="./d3.min.js"></script>
    <script src="./data/ontology.shortlist.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
